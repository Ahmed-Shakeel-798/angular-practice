<h2>Todo List</h2>

@if (!todoItems().length) {
  <p>Loading ...</p>
}

<div class="todo-container">

  <div class="todo-header">
    <div class="col-checkbox"></div>
    <div class="col-title">Title</div>
  </div>

  @for (todo of todoItems(); track todo.id) {
    <app-todo-item (todoToggled)="updateTodoItem($event)" [todo_item]="todo"/>
  }

</div>
