<div 
    class="todo-row" 
    [appHighlightCompletedTodo]="todo_item().completed"
>
    <div class="col-checkbox">
        <input
          type="checkbox"
          [checked]="todo_item().completed"
        />
    </div>

    <div class="col-title">
        {{ todo_item().title }}
    </div>
</div>
